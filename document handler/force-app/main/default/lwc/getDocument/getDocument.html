<template>
    <!-- <div class="slds-box slds-theme--default">
        <iframe src={siteURL} height="1200" width="1200"></iframe>
    </div> -->

    
    <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={navigateToRecordPage}>
                <lightning-icon icon-name="utility:close"
                   alternative-text="close"
                   variant="inverse"
                   size="small" ></lightning-icon>
                <span class="slds-assistive-text">Close</span>
        </button>
        <div class="slds-modal__header">
        <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate">{documentName}</h1>
        </div>
        
        <!-- slds-p-around_medium not required -->
        <!-- <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>  not required as spinner added on vf page -->
       
        <!-- 900 1000 
        "-->
        <div class="slds-modal__content slds-scrollable_none"   id="modal-content-id-1">
            <iframe src={siteURL} height="900" width="100%"></iframe>
        </div>
        <div class="slds-modal__footer">
        <button class="slds-button slds-button_neutral" aria-label="Cancel and close" onclick={navigateToRecordPage} >{label.LWC_Close_Button}</button>
       
        <!-- <button class="slds-button slds-button_brand">Save</button>   not required as we dont need save button-->
        
        </div>
        </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>

		
        
</template>
